services:

  # ── Databases ─────────────────────────────────────────────────────────
  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: ${POSTGRES_USER:-affiliate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    ports:
      - "5434:5432"
    volumes:
      - catalog_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-affiliate} -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  links-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: links_db
      POSTGRES_USER: ${POSTGRES_USER:-affiliate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    ports:
      - "5435:5432"
    volumes:
      - links_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-affiliate} -d links_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  tracker-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tracker_db
      POSTGRES_USER: ${POSTGRES_USER:-affiliate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    ports:
      - "5436:5432"
    volumes:
      - tracker_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-affiliate} -d tracker_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  analytics-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: ${POSTGRES_USER:-affiliate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    ports:
      - "5437:5432"
    volumes:
      - analytics_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-affiliate} -d analytics_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - affiliate_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Services ──────────────────────────────────────────────────────────
  catalog:
    build:
      context: .
      dockerfile: services/catalog/Dockerfile
    ports:
      - "8011:8011"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-affiliate}:${POSTGRES_PASSWORD}@catalog-db:5432/catalog_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY required}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY required}
      - SERVICE_NAME=catalog
      - PORT=8011
    depends_on:
      catalog-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared_pkg
      - ./services/catalog:/app/service

  links:
    build:
      context: .
      dockerfile: services/links/Dockerfile
    ports:
      - "8012:8012"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-affiliate}:${POSTGRES_PASSWORD}@links-db:5432/links_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CATALOG_SERVICE_URL=http://catalog:8011
      - SERVICE_NAME=links
      - PORT=8012
    depends_on:
      links-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      catalog:
        condition: service_started

  tracker:
    build:
      context: .
      dockerfile: services/tracker/Dockerfile
    ports:
      - "8013:8013"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-affiliate}:${POSTGRES_PASSWORD}@tracker-db:5432/tracker_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - LINKS_SERVICE_URL=http://links:8012
      - SERVICE_NAME=tracker
      - PORT=8013
    depends_on:
      tracker-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      links:
        condition: service_started

  analytics:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    ports:
      - "8014:8014"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-affiliate}:${POSTGRES_PASSWORD}@analytics-db:5432/analytics_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - TRACKER_SERVICE_URL=http://tracker:8013
      - CATALOG_SERVICE_URL=http://catalog:8011
      - LINKS_SERVICE_URL=http://links:8012
      - SERVICE_NAME=analytics
      - PORT=8014
    depends_on:
      analytics-db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment:
      - CATALOG_DB_URL=postgresql+asyncpg://${POSTGRES_USER:-affiliate}:${POSTGRES_PASSWORD}@catalog-db:5432/catalog_db
      - LINKS_DB_URL=postgresql+asyncpg://${POSTGRES_USER:-affiliate}:${POSTGRES_PASSWORD}@links-db:5432/links_db
      - TRACKER_DB_URL=postgresql+asyncpg://${POSTGRES_USER:-affiliate}:${POSTGRES_PASSWORD}@tracker-db:5432/tracker_db
      - ANALYTICS_DB_URL=postgresql+asyncpg://${POSTGRES_USER:-affiliate}:${POSTGRES_PASSWORD}@analytics-db:5432/analytics_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CATALOG_SERVICE_URL=http://catalog:8011
      - LINKS_SERVICE_URL=http://links:8012
      - TRACKER_SERVICE_URL=http://tracker:8013
      - ANALYTICS_SERVICE_URL=http://analytics:8014
    depends_on:
      catalog-db:
        condition: service_healthy
      links-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared_pkg
      - ./worker:/app/service

  scheduler:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: celery -A app.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CATALOG_DB_URL=postgresql+asyncpg://${POSTGRES_USER:-affiliate}:${POSTGRES_PASSWORD}@catalog-db:5432/catalog_db
      - LINKS_DB_URL=postgresql+asyncpg://${POSTGRES_USER:-affiliate}:${POSTGRES_PASSWORD}@links-db:5432/links_db
      - ANALYTICS_DB_URL=postgresql+asyncpg://${POSTGRES_USER:-affiliate}:${POSTGRES_PASSWORD}@analytics-db:5432/analytics_db
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared_pkg
      - ./worker:/app/service
      - scheduler_beat_data:/app/beat

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NEXT_TELEMETRY_DISABLED=1

volumes:
  catalog_pg_data:
  links_pg_data:
  tracker_pg_data:
  analytics_pg_data:
  affiliate_redis_data:
  scheduler_beat_data:
  frontend_node_modules:
